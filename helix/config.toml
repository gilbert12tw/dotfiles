theme = "base16_transparent"

[editor]
line-number = "relative"
cursorline = true
bufferline = "multiple"
mouse = false
auto-format = true

auto-completion = false
idle-timeout = 1000

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "underline"

[editor.indent-guides]
render = true
character = "╎"

[keys.normal]
"0" = "goto_line_start"
"$" = "goto_line_end"
"G" = "goto_last_line"

"esc" = ["collapse_selection", "keep_primary_selection"] # Esc clear hilight

[keys.normal.space]
# MD preview
"m" = [":sh tmux display-popup -d '#{pane_current_path}' -E -w 80%% -h 80%% 'glow -p %{buffer_name}'"]
 
[keys.select]
"0" = "goto_line_start"
"$" = "goto_line_end"
"G" = "goto_last_line"
