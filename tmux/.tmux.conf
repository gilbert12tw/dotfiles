# =================================================================
# SECTION 1: Core — no plugins required
# =================================================================

# ----------------- Terminal -----------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -gq allow-passthrough on

set -g base-index 1
set -g pane-base-index 1

set -g extended-keys on
set -g xterm-keys on

# ----------------- Prefix -----------------------
set-option -g prefix C-b
set-option -g prefix2 none

set -g detach-on-destroy off

# ----------------- Utility Bindings -----------------------
unbind r
bind r source-file ~/.tmux.conf

unbind v
bind v copy-mode

set -g bell-action any
set -g visual-bell off

setw -g monitor-activity on

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind > resize-pane -R 5
bind < resize-pane -L 5

# Copy mode (vi-style)
set-window-option -g mode-keys vi
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-selection

bind -r m resize-pane -Z
bind x kill-pane

set -g mouse on
unbind -T copy-mode-vi MouseDragEnd1Pane

bind t command-prompt "new-session -s '%%'"

# ----------------- Theme & Status Bar -----------------------
# Catppuccin Mocha palette (hardcoded — no plugin needed)
# bg=#1e1e2e  green=#a6e3a1  red=#f38ba8  blue=#89b4fa
# yellow=#f9e2af  overlay_0=#6c7086  overlay_1=#7f849c

set -g status-position top
set -g status-style "bg=#1e1e2e"
set -g status-justify "absolute-centre"

set -g status-left-length 100
set -g status-right-length 99

# Status left: session name (red bg when prefix active), path, zoom indicator
set -g status-left ""
set -ga status-left "#{?client_prefix,#[bg=#f38ba8 fg=#1e1e2e bold] 󰣘 #S ,#[bg=#1e1e2e fg=#a6e3a1] 󰣘 #S }"
set -ga status-left "#[bg=#1e1e2e,fg=#6c7086,none]│"
set -ga status-left "#[bg=#1e1e2e,fg=#89b4fa] 󰉋 #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#1e1e2e,fg=#6c7086,none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#1e1e2e,fg=#f9e2af]#{?window_zoomed_flag, 󱂬 zoom ,}"

set -g status-right ""

# Window list
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#1e1e2e,fg=#6c7086"
set -g window-status-last-style "bg=#1e1e2e,fg=#7f849c"

set -g window-status-activity-style "bg=#f38ba8,fg=#1e1e2e"
set -g window-status-bell-style "bg=#f38ba8,fg=#1e1e2e,bold"
set -gF window-status-separator "#[bg=#1e1e2e,fg=#6c7086]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#89b4fa,fg=#1e1e2e,bold"

# Popup shortcuts
bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

bind -r y run-shell '\
         SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
         tmux has-session -t "$SESSION" 2>/dev/null || \
         tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude"; \
         tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'

# =================================================================
# SECTION 2: Plugins — requires TPM
# =================================================================

set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"

set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"

run '~/.config/tmux/.tmux/plugins/tpm/tpm' # always keep this line last
