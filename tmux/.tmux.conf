# =================================================================
# SECTION 1: Core — no plugins required
# =================================================================

# ----------------- Terminal -----------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -gq allow-passthrough on

set -g base-index 1
set -g pane-base-index 1

set -g extended-keys on
set -g xterm-keys on

# ----------------- Prefix -----------------------
set-option -g prefix C-b
set-option -g prefix2 none

set -g detach-on-destroy off

# ----------------- Utility Bindings -----------------------
unbind r
bind r source-file ~/.tmux.conf

unbind v
bind v copy-mode

set -g bell-action any
set -g visual-bell off

setw -g monitor-activity on

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind > resize-pane -R 5
bind < resize-pane -L 5

# Copy mode (vi-style)
set-window-option -g mode-keys vi
bind -T copy-mode-vi 'v' send -X begin-selection
# bind -T copy-mode-vi 'y' send -X copy-selection
bind -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy" # mac 

bind -r m resize-pane -Z
bind x kill-pane

set -g mouse on
unbind -T copy-mode-vi MouseDragEnd1Pane

bind t command-prompt "new-session -s '%%'"

# ----------------- Theme & Status Bar -----------------------
# Use terminal theme colors:
# - default inherits the terminal foreground/background
# - colour0-15 use the terminal's ANSI palette, so they follow theme changes

set -g status-position top
set -g status-style "bg=default,fg=default"
set -g status-justify "absolute-centre"
set -g status-left-length 200

# Status left: session name (red bg when prefix active), path, zoom indicator
set -g status-left ""
set -ga status-left "#{?client_prefix,#[reverse bold]   #S ,#[fg=colour2]   #S }"
set -ga status-left "#[fg=colour8,none]|"
set -ga status-left "#[fg=colour4]   #{s|$HOME|~|:#{pane_current_path}} "
set -ga status-left "#[fg=colour8,none]#{?window_zoomed_flag,|,}"
set -ga status-left "#[fg=colour3]#{?window_zoomed_flag, 󱂬 zoom ,}"

set -g status-right ""

# Window list
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"
set-window-option -g automatic-rename off

set -g window-status-format "#[fg=colour8,nobold,noreverse] #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=default,fg=colour8"
set -g window-status-last-style "bg=default,fg=colour8"

set -g window-status-activity-style "reverse"
set -g window-status-bell-style "reverse,bold"
set -gF window-status-separator "#[fg=colour8]|"

set -g window-status-current-format "#[fg=colour7,bold,noreverse] #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=default,fg=colour7,bold,noreverse"

# --------------------------------------------------
# Popup shortcuts
# --------------------------------------------------

# Make popup border more obvious
set -g popup-border-lines double
set -g popup-border-style 'fg=brightcyan,bold'

bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# --------------------------------------------------
# Agent popup windows
# All agents live inside one tmux session: "agents"
# --------------------------------------------------

# Claude Code agent
bind -r y run-shell '\
  AGENT_SESSION="agents"; \
  DIR="#{pane_current_path}"; \
  DIR_NAME="$(basename "$DIR")"; \
  HASH="$(printf "%s" "$DIR" | md5 -q | cut -c1-8)"; \
  WIN_NAME="claude-${DIR_NAME}-${HASH}"; \
  if ! tmux has-session -t "$AGENT_SESSION" 2>/dev/null; then \
    tmux new-session -d -s "$AGENT_SESSION" -n "$WIN_NAME" -c "$DIR" "claude"; \
  elif ! tmux list-windows -t "$AGENT_SESSION" -F "##{window_name}" | grep -Fxq "$WIN_NAME"; then \
    tmux new-window -d -t "$AGENT_SESSION:" -n "$WIN_NAME" -c "$DIR" "claude"; \
  fi; \
  tmux set-option -t "$AGENT_SESSION" status off; \
  tmux select-window -t "$AGENT_SESSION:$WIN_NAME"; \
  tmux display-popup -w80% -h80% -T " Claude " -E "tmux attach-session -t $AGENT_SESSION"'

# Codex agent
bind -r o run-shell '\
  AGENT_SESSION="agents"; \
  DIR="#{pane_current_path}"; \
  DIR_NAME="$(basename "$DIR")"; \
  HASH="$(echo "$DIR" | md5sum | cut -c1-8)"; \
  WIN_NAME="codex-${DIR_NAME}-${HASH}"; \
  if ! tmux has-session -t "$AGENT_SESSION" 2>/dev/null; then \
    tmux new-session -d -s "$AGENT_SESSION" -n "$WIN_NAME" -c "$DIR" "codex"; \
  elif ! tmux list-windows -t "$AGENT_SESSION" -F "##{window_name}" | grep -Fxq "$WIN_NAME"; then \
    tmux new-window -d -t "$AGENT_SESSION:" -n "$WIN_NAME" -c "$DIR" "codex"; \
  fi; \
  tmux select-window -t "$AGENT_SESSION:$WIN_NAME"; \
  tmux display-popup -w80% -h80% -T " Codex " -E "tmux attach-session -t $AGENT_SESSION"'

# Find and jump to agent window with fzf
bind -r a display-popup -w70% -h60% -E '\
  AGENT_SESSION="agents"; \
  if ! tmux has-session -t "$AGENT_SESSION" 2>/dev/null; then \
    echo "No agent session found"; \
    read; \
    exit 0; \
  fi; \
  TARGET=$(tmux list-windows -t "$AGENT_SESSION" -F "#{window_index}:#{window_name}" \
    | fzf --prompt="Agent > " --height=100% --reverse); \
  if [ -n "$TARGET" ]; then \
    WIN_INDEX="${TARGET%%:*}"; \
    tmux select-window -t "$AGENT_SESSION:$WIN_INDEX"; \
    tmux attach-session -t "$AGENT_SESSION"; \
  fi'

# =================================================================
# SECTION 2: Plugins — requires TPM
# =================================================================

set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"

set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"

run '~/.config/tmux/.tmux/plugins/tpm/tpm' # always keep this line last
